services:
  nathan-portfolio:
    container_name: nathan-portfolio
    build:
      context: .
      dockerfile: Dockerfile
    image: nathan-portfolio:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nathanreardon.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
